<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="shieldGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5c2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5c3a1e" />
      <stop offset="100%" style="stop-color:#8b5e3c" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- Escudo principal (forma heráldica) -->
  <path d="M100 10 L180 30 L180 120 Q180 175 100 205 Q20 175 20 120 L20 30 Z"
        fill="url(#shieldGreen)" filter="url(#shadow)" />

  <!-- Borda dourada do escudo -->
  <path d="M100 10 L180 30 L180 120 Q180 175 100 205 Q20 175 20 120 L20 30 Z"
        fill="none" stroke="url(#shieldGold)" stroke-width="5" />

  <!-- Divisão interna (quartelado) - faixa horizontal -->
  <path d="M22 108 L178 108" stroke="url(#shieldGold)" stroke-width="3" />

  <!-- Divisão interna - faixa vertical -->
  <path d="M100 12 L100 203" stroke="url(#shieldGold)" stroke-width="3" />

  <!-- CARVALHO (ÁRVORE) no quadrante superior esquerdo -->
  <!-- Tronco -->
  <rect x="88" y="75" width="8" height="28" rx="2" fill="url(#trunkGrad)" />
  <!-- Raízes -->
  <path d="M88 103 Q82 107 78 106" stroke="#5c3a1e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M96 103 Q102 107 106 106" stroke="#5c3a1e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M92 104 L92 109" stroke="#5c3a1e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Copa principal -->
  <circle cx="92" cy="62" r="20" fill="#2d7a3a" />
  <!-- Copas laterais -->
  <circle cx="75" cy="70" r="14" fill="#2d7a3a" />
  <circle cx="109" cy="70" r="14" fill="#2d7a3a" />
  <!-- Copa topo -->
  <circle cx="92" cy="50" r="15" fill="#3a9e4a" />
  <!-- Brilho copa -->
  <circle cx="85" cy="47" r="5" fill="#4dbf60" opacity="0.5" />
  <!-- Bolotas (carvalho) -->
  <ellipse cx="80" cy="78" rx="4" ry="3" fill="#d4a017" />
  <line x1="80" y1="75" x2="80" y2="71" stroke="#5c3a1e" stroke-width="1.5"/>
  <ellipse cx="104" cy="76" rx="4" ry="3" fill="#d4a017" />
  <line x1="104" y1="73" x2="104" y2="69" stroke="#5c3a1e" stroke-width="1.5"/>

  <!-- Estrelas douradas no quadrante superior direito (3 estrelas) -->
  <!-- Estrela 1 -->
  <polygon points="140,32 142,39 149,39 144,43 146,50 140,46 134,50 136,43 131,39 138,39"
           fill="url(#shieldGold)" />
  <!-- Estrela 2 -->
  <polygon points="152,55 153.5,60 159,60 155,63 156.5,68 152,65 147.5,68 149,63 145,60 150.5,60"
           fill="url(#shieldGold)" />
  <!-- Estrela 3 -->
  <polygon points="130,55 131.5,60 137,60 133,63 134.5,68 130,65 125.5,68 127,63 123,60 128.5,60"
           fill="url(#shieldGold)" />

  <!-- Leão dourado no quadrante inferior esquerdo (estilizado) -->
  <text x="60" y="175" font-size="38" text-anchor="middle" fill="url(#shieldGold)" font-family="serif">♛</text>

  <!-- Monograma no quadrante inferior direito -->
  <text x="140" y="170" font-size="36" text-anchor="middle" fill="url(#shieldGold)"
        font-family="Georgia, serif" font-weight="bold" font-style="italic">C</text>

  <!-- Elmo / Timbre acima do escudo (pequeno ornamento) -->
  <ellipse cx="100" cy="11" rx="18" ry="7" fill="url(#shieldGold)" />
  <rect x="88" y="4" width="24" height="8" rx="3" fill="url(#shieldGold)" />
  <rect x="92" y="2" width="4" height="5" rx="1" fill="#d4a017" />
  <rect x="100" y="1" width="4" height="6" rx="1" fill="#d4a017" />
  <rect x="96" y="0" width="4" height="5" rx="1" fill="#d4a017" />
  <rect x="104" y="2" width="4" height="5" rx="1" fill="#d4a017" />

  <!-- Fita / Listel na base -->
  <path d="M35 200 Q60 212 100 215 Q140 212 165 200 L160 208 Q140 220 100 222 Q60 220 40 208 Z"
        fill="url(#shieldGold)" />
  <path d="M35 200 Q60 212 100 215 Q140 212 165 200" fill="none" stroke="#b8860b" stroke-width="1.5"/>

  <!-- Texto na fita -->
  <text x="100" y="213" font-size="9" text-anchor="middle" fill="#1a0a00"
        font-family="Georgia, serif" font-weight="bold" letter-spacing="1">FAMÍLIA CARVALHO</text>
</svg>
